<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --blue-0: #1e40af;
    --blue-1: #2563eb;
    --blue-2: #1d4ed8;
    --cyan: #22d3ee;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 440px; height: 280px; overflow: hidden; }
  .stage {
    position: relative; width: 440px; height: 280px;
    background:
      radial-gradient(120% 140% at 12% 8%, rgba(96,165,250,0.55), transparent 55%),
      linear-gradient(135deg, var(--blue-0) 0%, var(--blue-1) 52%, var(--blue-2) 100%);
    font-family: var(--font);
    overflow: hidden;
  }
  /* faint brand-tied bar texture */
  .deco { position: absolute; inset: 0; overflow: hidden; }
  .deco span {
    position: absolute; height: 15px; border-radius: 999px;
    background: rgba(255,255,255,0.07);
  }
  .deco .c { background: rgba(94,234,212,0.12); }
  .b1 { width: 250px; top: 30px; right: -70px; transform: rotate(-9deg); }
  .b2 { width: 150px; top: 60px; right: -30px; transform: rotate(-9deg); }
  .b3 { width: 120px; bottom: 30px; left: -34px; transform: rotate(-9deg); }
  .b4 { width: 190px; bottom: 60px; left: -60px; transform: rotate(-9deg); }

  .content {
    position: absolute; inset: 0;
    display: flex; align-items: center; gap: 22px;
    padding: 0 30px;
  }
  .tile {
    width: 108px; height: 108px; flex: 0 0 auto;
    border-radius: 26px;
    box-shadow: 0 18px 34px rgba(8,20,60,0.45), 0 0 0 1px rgba(255,255,255,0.14) inset;
  }
  .tile svg { display: block; width: 100%; height: 100%; }

  .copy { display: flex; flex-direction: column; }
  .brand {
    font-size: 46px; font-weight: 800; letter-spacing: -0.025em;
    color: #fff; line-height: 1;
    text-shadow: 0 2px 10px rgba(6,16,50,0.35);
  }
  .brand .mod { color: #a5f3ea; }
  .tag {
    margin-top: 12px; font-size: 15px; font-weight: 500; line-height: 1.35;
    color: rgba(255,255,255,0.86); max-width: 230px;
  }
  .pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 16px; }
  .pill {
    font-family: var(--mono); font-size: 10.5px; font-weight: 600;
    color: rgba(255,255,255,0.92);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.14);
    padding: 4px 9px; border-radius: 999px;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="deco">
    <span class="b1 c"></span>
    <span class="b2"></span>
    <span class="b3"></span>
    <span class="b4 c"></span>
  </div>

  <div class="content">
    <div class="tile">
      <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#3b82f6"/><stop offset="0.55" stop-color="#2563eb"/><stop offset="1" stop-color="#1d4ed8"/>
          </linearGradient>
          <linearGradient id="badge" x1="70" y1="60" x2="114" y2="104" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#06b6d4"/>
          </linearGradient>
          <radialGradient id="sheen" cx="38" cy="30" r="80" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#fff" stop-opacity="0.28"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect x="0" y="0" width="128" height="128" rx="29" fill="url(#bg)"/>
        <rect x="0" y="0" width="128" height="128" rx="29" fill="url(#sheen)"/>
        <rect x="26" y="39" width="54" height="13" rx="6.5" fill="#fff" fill-opacity="0.97"/>
        <rect x="26" y="63" width="40" height="13" rx="6.5" fill="#fff" fill-opacity="0.82"/>
        <circle cx="92" cy="83" r="27" fill="#1d4ed8"/>
        <circle cx="92" cy="83" r="22" fill="url(#badge)"/>
        <g stroke="#0e2a66" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <path d="M92 71 L92 93"/><path d="M82 84 L92 95 L102 84"/>
        </g>
      </svg>
    </div>
    <div class="copy">
      <div class="brand">Head<span class="mod">Mod</span></div>
      <div class="tag">Inject &amp; modify HTTP headers and cookies — per site, per profile.</div>
      <div class="pills">
        <span class="pill">Manifest V3</span>
        <span class="pill">declarativeNetRequest</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
